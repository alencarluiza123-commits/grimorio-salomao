<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clavis Salomonis</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(ellipse at 50% 0%,#1a0e00,#0d0700 40%,#050300);min-height:100vh;font-family:'EB Garamond',serif;display:flex;flex-direction:column;align-items:center;padding:16px}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes spinr{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
@keyframes pulse{0%,100%{opacity:.4;transform:scale(.7)}50%{opacity:1;transform:scale(1.2)}}
@keyframes flicker{0%,100%{opacity:1}93%{opacity:.6}96%{opacity:.8}}
.container{width:100%;max-width:720px}
.header{text-align:center;margin-bottom:20px}
.orbital{position:relative;width:90px;height:90px;margin:0 auto 12px}
.ring1{position:absolute;inset:0;border:1px solid rgba(180,134,11,.4);border-radius:50%;animation:spin 20s linear infinite;display:flex;align-items:flex-start;justify-content:center;padding-top:3px}
.ring2{position:absolute;inset:12px;border:1px solid rgba(180,134,11,.25);border-radius:50%;animation:spinr 15s linear infinite;display:flex;align-items:flex-end;justify-content:center;padding-bottom:3px}
.center-sym{position:absolute;inset:28px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#d4a017;text-shadow:0 0 20px rgba(212,160,23,.8);animation:flicker 8s infinite}
.title{font-family:'Cinzel Decorative',cursive;font-size:clamp(13px,4vw,20px);background:linear-gradient(90deg,#8b6914,#d4a017,#f0c040,#d4a017,#8b6914);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4s linear infinite;letter-spacing:.15em}
.planets{font-family:'Cinzel',serif;font-size:11px;color:rgba(140,100,20,.6);letter-spacing:.3em;margin-top:4px}
.chatbox{background:rgba(8,5,2,.92);border:1px solid rgba(180,134,11,.3);border-radius:2px}
.chat-label{text-align:center;padding:10px;border-bottom:1px solid rgba(180,134,11,.15);font-family:'Cinzel',serif;font-size:9px;color:rgba(140,100,20,.6);letter-spacing:.4em}
.messages{height:420px;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px}
.messages::-webkit-scrollbar{width:5px}
.messages::-webkit-scrollbar-thumb{background:#4a3500;border-radius:3px}
.msg{display:flex;gap:10px;align-items:flex-start}
.msg.user{justify-content:flex-end}
.avatar{width:30px;height:30px;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;margin-top:2px}
.av-raziel{border:1px solid rgba(180,134,11,.4);color:#d4a017;background:rgba(20,12,0,.8)}
.av-user{border:1px solid rgba(140,100,20,.3);color:#a08030;background:rgba(20,12,0,.6);font-family:'Cinzel',serif;font-size:10px}
.bubble{max-width:78%;padding:12px 16px;border-radius:2px;font-size:15px;line-height:1.75;color:rgba(210,180,130,.9)}
.bubble-raziel{background:rgba(20,12,0,.7);border:1px solid rgba(120,90,10,.2)}
.bubble-user{background:rgba(60,35,0,.5);border:1px solid rgba(180,134,11,.3);color:rgba(220,185,100,.9)}
.sender{font-family:'Cinzel',serif;font-size:9px;color:rgba(140,100,20,.6);letter-spacing:.3em;margin-bottom:6px}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(180,134,11,.3),transparent);margin:0 16px}
.input-area{padding:14px 16px;display:flex;gap:10px;align-items:flex-end}
textarea{flex:1;background:rgba(10,6,0,.8);border:1px solid rgba(140,100,20,.3);border-radius:2px;padding:10px 14px;color:rgba(210,175,100,.9);font-family:'EB Garamond',serif;font-size:15px;resize:none;line-height:1.6}
textarea:focus{outline:none;border-color:rgba(180,134,11,.6)}
textarea::placeholder{color:rgba(150,110,40,.4);font-style:italic}
.send-btn{width:44px;height:44px;background:rgba(80,50,5,.7);border:1px solid rgba(180,134,11,.5);border-radius:2px;color:#d4a017;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn:disabled{opacity:.3;cursor:not-allowed}
.hint{text-align:center;padding:6px 16px 12px;font-family:'Cinzel',serif;font-size:9px;color:rgba(100,70,15,.5);letter-spacing:.2em}
.dots{display:flex;gap:5px;padding:4px 0}
.dot{width:7px;height:7px;border-radius:50%;background:#b8860b;animation:pulse 1.2s infinite ease-in-out}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="orbital">
      <div class="ring1"><span style="font-size:9px;color:#b8860b">✦</span></div>
      <div class="ring2"><span style="font-size:8px;color:#8b6914">◈</span></div>
      <div class="center-sym">☽</div>
    </div>
    <div class="title">CLAVIS SALOMONIS</div>
    <div class="planets">☉  ☽  ♂  ☿  ♃  ♀  ♄</div>
  </div>
  <div class="chatbox">
    <div class="chat-label">✦ RAZIEL, O GUARDIÃO ✦</div>
    <div class="messages" id="messages"></div>
    <div class="divider"></div>
    <div class="input-area">
      <textarea id="input" rows="2" placeholder="Faz tua pergunta ao Guardião do Grimório..."></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">✦</button>
    </div>
    <div class="hint">ENTER PARA ENVIAR · SHIFT+ENTER NOVA LINHA</div>
  </div>
</div>
<script>
const msgs=[{role:'assistant',content:'☽ *As chamas da vela tremulam...*\n\nSalve, buscador. Eu sou **Raziel**, guardião da **Chave de Salomão**.\n\nPergunta, iniciado — mas escolhe bem tuas palavras.'}];
function fmt(t){return t.replace(/\*\*([^*]+)\*\*/g,'<strong style="color:#d4a017">$1</strong>').replace(/\*([^*]+)\*/g,'<em style="color:#a08030">$1</em>').replace(/\n/g,'<br>')}
function render(){
  const el=document.getElementById('messages');
  el.innerHTML=msgs.map(m=>m.role==='assistant'?`<div class="msg"><div class="avatar av-raziel">☽</div><div class="bubble bubble-raziel"><div class="sender">RAZIEL</div>${fmt(m.content)}</div></div>`:`<div class="msg user"><div class="bubble bubble-user">${fmt(m.content)}</div><div class="avatar av-user">✦</div></div>`).join('');
  el.scrollTop=el.scrollHeight;
}
function typing(){
  const el=document.getElementById('messages');
  el.innerHTML+=`<div class="msg" id="typing"><div class="avatar av-raziel">☽</div><div class="bubble bubble-raziel"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div>`;
  el.scrollTop=el.scrollHeight;
}
async function sendMessage(){
  const input=document.getElementById('input');
  const text=input.value.trim();
  if(!text)return;
  msgs.push({role:'user',content:text});
  input.value='';
  render();
  typing();
  document.getElementById('sendBtn').disabled=true;
  try{
    const res=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:msgs.map(m=>({role:m.role,content:m.content}))})});
    const data=await res.json();
    msgs.push({role:'assistant',content:data.reply||'*O grimório silencia...*'});
  }catch(e){
    msgs.push({role:'assistant',content:'*Os ventos do éter perturbam... Tenta novamente.*'});
  }
  render();
  document.getElementById('sendBtn').disabled=false;
}
document.getElementById('input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
render();
</script>
</body>
</html>
